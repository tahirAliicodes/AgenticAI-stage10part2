<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>HITL Control Panel — Minimal</title>
    <style>
        body { font-family: monospace; background: #1e1e1e; color: #d4d4d4; padding: 20px; }
        button { padding: 8px 16px; margin: 5px; cursor: pointer; border: none; border-radius: 4px; }
        .approve { background: #4caf50; color: white; }
        .reject { background: #f44336; color: white; }
        .start { background: #2196f3; color: white; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        #log { background: #252526; padding: 10px; height: 400px; overflow-y: auto; margin-top: 20px; }
        input { padding: 8px; width: 300px; background: #3c3c3c; color: white; border: 1px solid #555; }
    </style>
</head>
<body>
    <h2>🐺 HITL Control Panel — Minimal</h2>
    <input id="query" type="text" placeholder="Enter query..." value="quantum computing" />
    <button class="start" id="startBtn" onclick="startQuery()">▶ Start</button>

    <div>
        <button class="approve" onclick="decide('research', true)">✅ Approve Research</button>
        <button class="reject" onclick="decide('research', false)">❌ Reject Research</button>
    </div>
    <div>
        <button class="approve" onclick="decide('writer', true)">✅ Approve Writer</button>
        <button class="reject" onclick="decide('writer', false)">❌ Reject Writer</button>
    </div>

    <div id="log"></div>

    <script>
    const log = document.getElementById('log');
    const startBtn = document.getElementById('startBtn');
    let isRunning = false;
    let currentRunId = null;
    let currentReader = null;
    let aborted = false;

    function addLog(msg, color = '#d4d4d4') {
        log.innerHTML += `<div style="color:${color}">${msg}</div>`;
        log.scrollTop = log.scrollHeight;
    }

    async function startQuery() {
        if (isRunning) {
            addLog('⚠️ A run is already in progress.', '#ffeb3b');
            return;
        }
        isRunning = true;
        startBtn.disabled = true;
        startBtn.textContent = '⏳ Running...';

        const query = document.getElementById('query').value;
        log.innerHTML = '';
        addLog(`Starting: ${query}`, '#2196f3');

        if (currentReader) {
            try { await currentReader.cancel(); } catch (e) {}
            currentReader = null;
        }
        aborted = false;
        currentRunId = null;

        const TERMINAL_STATUSES = new Set(['final', 'blocked', 'error']);

        try {
            const response = await fetch(`http://127.0.0.1:8000/orchestrate/stream?query=${encodeURIComponent(query)}`);
            if (!response.ok || !response.body) {
                addLog(`Stream failed to start (HTTP ${response.status})`, '#f44336');
                return;
            }

            const reader = response.body.getReader();
            currentReader = reader;
            const decoder = new TextDecoder();
            let buffer = '';

            while (true) {
                const { value, done } = await reader.read();
                if (done || aborted) break;

                buffer += decoder.decode(value, { stream: true });
                const parts = buffer.split('\n\n');
                buffer = parts.pop();

                for (const part of parts) {
                    const line = part.trim();
                    if (!line.startsWith('data:')) continue;

                    let data;
                    try {
                        data = JSON.parse(line.slice('data:'.length).trim());
                    } catch (e) {
                        continue;
                    }

                    if (data.run_id) currentRunId = data.run_id;

                    const color = data.status === 'awaiting_approval' ? '#ffeb3b' :
                                  data.status === 'final' ? '#4caf50' :
                                  data.status === 'error' || data.status === 'blocked' ? '#f44336' :
                                  '#d4d4d4';
                    const pii = data.pii_found && data.pii_found.length ? ` | PII redacted: ${data.pii_found.join(', ')}` : '';
                    addLog(`[${data.agent}] ${data.status}: ${data.msg || ''}${pii}`, color);

                    if (TERMINAL_STATUSES.has(data.status)) {
                        aborted = true;
                        await reader.cancel();
                        break;
                    }
                }
            }
        } catch (err) {
            addLog(`Stream error: ${err.message}`, '#f44336');
        } finally {
            currentReader = null;
            isRunning = false;
            startBtn.disabled = false;
            startBtn.textContent = '▶ Start';
        }
    }

    function decide(agentName, approved) {
        if (!currentRunId) {
            addLog('⚠️ No active run to approve/reject.', '#ffeb3b');
            return;
        }
        const path = approved ? 'approve' : 'reject';
        fetch(`http://127.0.0.1:8000/${path}/${currentRunId}/${agentName}`, { method: 'POST' })
            .then(r => r.json())
            .then(data => {
                if (data.ok) {
                    addLog(`→ ${path}d ${agentName}`, approved ? '#4caf50' : '#f44336');
                } else {
                    addLog(`→ ${path} failed for ${agentName} (run may have moved on)`, '#f44336');
                }
            });
    }
    </script>
</body>
</html>
